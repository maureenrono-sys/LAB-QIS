<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lab-QIS Intelligence</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-navy: #5d3fd3;
            --primary-blue-dark: #4f31b6;
            --primary-blue-light: #6b47d8;
            --medical-teal: #0f766e;
            --accent-cyan: #0ea5e9;
            --bg-light: #eef4f8;
            --ink: #1f2937;
            --muted: #64748b;
            --lab-photo-url: url('https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&w=1600&q=80');
        }

        body {
            position: relative;
            background: linear-gradient(130deg, #ecf4fa 0%, #deebf3 50%, #d8efec 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            color: var(--ink);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: var(--lab-photo-url);
            background-size: cover;
            background-position: center;
            filter: saturate(0.85) contrast(1.03);
            opacity: 0.18;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(93, 63, 211, 0.55), rgba(15, 118, 110, 0.38), rgba(14, 165, 233, 0.42));
            background-size: 220% 220%;
            animation: ambientShift 10s ease-in-out infinite;
            mix-blend-mode: multiply;
            opacity: 0.55;
            z-index: 0;
            pointer-events: none;
        }

        .auth-container {
            min-height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.85rem 1rem;
        }

        .auth-layout {
            width: min(560px, 100%);
            display: grid;
            gap: 0.75rem;
        }

        .marketing-strip {
            position: static;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
            z-index: 2;
            padding: 0.7rem 0.9rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.35);
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .marketing-label {
            display: inline-block;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            color: #0f766e;
            margin-bottom: 0.2rem;
        }

        .marketing-text {
            margin: 0;
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--primary-navy);
            min-height: 1.4rem;
            transition: opacity 0.26s ease, transform 0.26s ease;
        }

        .marketing-text.is-exiting {
            opacity: 0;
            transform: translateY(-8px);
        }

        .marketing-text.is-entering {
            opacity: 0;
            transform: translateY(10px);
        }

        .auth-card {
            width: 100%;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.94);
            padding: 1.55rem 1.75rem;
            border-radius: 16px;
            border: 1px solid #d9e3ec;
            box-shadow: 0 14px 36px rgba(93, 63, 211, 0.14);
            backdrop-filter: blur(4px);
            position: relative;
            margin: 0 auto;
        }

        .auth-card .mb-4 {
            margin-bottom: 1rem !important;
        }

        .auth-card .mb-3 {
            margin-bottom: 0.75rem !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-navy), var(--primary-blue-light));
            border: 0;
            padding: 0.78rem;
            font-weight: 700;
            border-radius: 10px;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 20px rgba(93, 63, 211, 0.24);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-blue-dark), #4338ca);
            transform: translateY(-1px);
        }

        .btn-primary:focus {
            box-shadow: 0 0 0 0.22rem rgba(93, 63, 211, 0.28);
        }

        .btn-outline-primary {
            color: var(--medical-teal);
            border-color: #6bb4ac;
            border-radius: 10px;
            background: #f7fbfa;
            font-weight: 600;
        }

        .btn-outline-primary:hover {
            color: #ffffff;
            background: var(--medical-teal);
            border-color: var(--medical-teal);
        }

        .form-control:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 0.2rem rgba(14, 165, 233, 0.14);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.65); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes ambientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .version-badge {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.7rem;
            color: #7b8794;
        }

        .text-teal { color: var(--medical-teal); }
        .text-navy { color: var(--primary-navy); }

        .auth-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #0f766e;
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            padding: 0.35rem 0.62rem;
            margin-bottom: 0.85rem;
        }

        .trust-list {
            display: grid;
            gap: 0.45rem;
            margin-top: 0.7rem;
            color: var(--muted);
            font-size: 0.84rem;
        }

        @media (max-width: 768px) {
            .marketing-strip {
                width: 100%;
                padding: 0.62rem 0.72rem;
            }

            .marketing-text {
                font-size: 0.9rem;
            }

            .auth-container {
                padding: 0.75rem 0.75rem;
            }

            .auth-card {
                padding: 1.2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-layout">
            <section class="auth-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-navy">LAB-QIS</h2>
                    <p class="text-muted">Quality Intelligence System</p>
                </div>

                <span class="auth-kicker"><i class="bi bi-shield-check"></i> Secure Access</span>
                <h4 class="fw-bold mb-2 text-navy">Sign In To Your Lab Workspace</h4>
                <p class="text-muted small mb-3">Use your assigned credentials.</p>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Professional Email</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="name@lab.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Security Password</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Enter Secure Dashboard
                    </button>
                    <button id="demoAdminBtn" type="button" class="btn btn-outline-primary w-100 border-0 small text-decoration-underline">
                        Launch Demo Workspace
                    </button>
                </form>

                <div class="trust-list">
                    <div><i class="bi bi-check2-circle me-2 text-teal"></i>ISO 15189 aligned workflow monitoring</div>
                    <div><i class="bi bi-check2-circle me-2 text-teal"></i>Role-based access and audit-ready records</div>
                </div>

                <div id="message" class="mt-4 text-center text-danger small fw-bold"></div>
                <div class="version-badge">v2.1.0-Compliance-Stable</div>
            </section>

            <div class="marketing-strip">
                <span class="marketing-label">LAB-QIS in action</span>
                <p id="marketingText" class="marketing-text">Real-time quality assurance tracking for every lab unit.</p>
            </div>
        </div>
    </div>

    <script>
        const API_CANDIDATES = [
            'http://localhost:5000/api',
            'http://127.0.0.1:5000/api'
        ];
        const MARKETING_MESSAGES = [
            'Real-time quality assurance tracking for every lab unit.',
            'ISO 15189 and SLIPTA compliance visibility in one dashboard.',
            'Faster CAPA follow-up with role-based action alerts.',
            'Data-driven insights to improve turnaround and patient safety.'
        ];
        const marketingTextEl = document.getElementById('marketingText');
        const loginForm = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        let marketingIndex = 0;

        function rotateMarketingMessage() {
            if (!marketingTextEl) return;
            marketingTextEl.classList.add('is-exiting');
            setTimeout(() => {
                marketingIndex = (marketingIndex + 1) % MARKETING_MESSAGES.length;
                marketingTextEl.textContent = MARKETING_MESSAGES[marketingIndex];
                marketingTextEl.classList.remove('is-exiting');
                marketingTextEl.classList.add('is-entering');
                requestAnimationFrame(() => {
                    marketingTextEl.classList.remove('is-entering');
                });
            }, 260);
        }

        setInterval(rotateMarketingMessage, 3600);

        async function fetchWithApiFallback(path, options) {
            let lastError = null;
            for (const apiBase of API_CANDIDATES) {
                try {
                    return await fetch(`${apiBase}${path}`, options);
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error('Failed to reach API.');
        }

        function persistSession(data, options = {}) {
            const { isDemo = false } = options;
            localStorage.setItem('token', data.token);
            localStorage.setItem('userRole', data.user.role);
            localStorage.setItem('roleKey', data.user.roleKey || '');
            localStorage.setItem('labName', data.user.labName || '');
            localStorage.setItem('labId', data.user.lab?.id || data.user.labId || '');
            localStorage.setItem('fullName', data.user.fullName || '');
            localStorage.setItem('profilePhotoUrl', data.user.profilePhotoUrl || '');
            localStorage.setItem('lastLoginAt', data.user.lastLoginAt || '');
            localStorage.setItem('isDemoMode', isDemo ? 'true' : 'false');
            localStorage.removeItem('viewRoleKey');
            localStorage.removeItem('adminViewLabId');
            localStorage.removeItem('adminViewLabName');
        }

        async function loginWithCredentials(email, password, options = {}) {
            const response = await fetchWithApiFallback('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || 'Login failed.');
            }
            persistSession(data, options);
            window.location.href = 'dashboard.html';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await loginWithCredentials(
                    document.getElementById('loginEmail').value.trim(),
                    document.getElementById('loginPassword').value
                );
            } catch (err) {
                messageEl.textContent = err.message || 'Unable to reach server. Confirm backend is running.';
            }
        });

        document.getElementById('demoAdminBtn').addEventListener('click', async () => {
            try {
                messageEl.textContent = 'Initializing secure demo environment...';
                const seedResponse = await fetchWithApiFallback('/auth/demo-bootstrap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const seedData = await seedResponse.json();
                if (!seedResponse.ok) {
                    throw new Error(seedData.message || 'Demo setup failed.');
                }
                await loginWithCredentials('admin@labqis.demo', 'Admin@123', { isDemo: true });
            } catch (error) {
                messageEl.textContent = error.message || 'Unable to create demo data.';
            }
        });
    </script>
</body>
</html>
