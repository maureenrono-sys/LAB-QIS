services:
  - name: lab-qis-web
    type: web
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: lab-qis-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false

databases:
  - name: lab-qis-db
    plan: free
    region: oregon
    databaseName: lab_qis
